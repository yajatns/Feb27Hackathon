# Render Blueprint - backoffice.ai
# Deploy: connect repo in Render dashboard, it auto-detects this file

services:
  # FastAPI Backend
  - type: web
    name: backoffice-api
    runtime: python
    repo: https://github.com/yajatns/Feb27Hackathon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SENSO_API_KEY
        sync: false
      - key: REKA_API_KEY
        sync: false
      - key: YUTORI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: backoffice-db
          property: connectionURI

  # Next.js Frontend (Static Export)
  - type: web
    name: backoffice-dashboard
    runtime: static
    repo: https://github.com/yajatns/Feb27Hackathon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    routes:
      - type: rewrite
        source: /graph
        destination: /graph.html
      - type: rewrite
        source: /hire
        destination: /hire.html
      - type: rewrite
        source: /query
        destination: /query.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://backoffice-api-ep7k.onrender.com

databases:
  - name: backoffice-db
    plan: free
    databaseName: backoffice
